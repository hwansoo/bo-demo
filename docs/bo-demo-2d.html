<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 베이지안 최적화 시각화</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #f1f5f9;
            --success: #10b981;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg-main); 
            color: var(--text-main);
            line-height: 1.6;
        }

        .header { 
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white; 
            padding: 30px 20px; 
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.025em; }

        .dashboard { 
            display: grid; 
            grid-template-columns: 320px 1fr; 
            gap: 24px; 
            max-width: 1500px; 
            margin: -20px auto 40px; 
            padding: 0 20px;
        }

        /* 왼쪽 컨트롤 패널 */
        .sidebar { 
            background: var(--bg-card); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
            height: fit-content;
            border: 1px solid var(--border);
            position: sticky;
            top: 20px;
        }
        .sidebar h2 { 
            margin-top: 0; 
            color: var(--text-main); 
            font-size: 18px; 
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: var(--primary);
            border-radius: 2px;
        }

        .control-group { margin-bottom: 24px; }
        .control-group label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 10px; 
            color: var(--text-main);
            font-size: 14px;
        }

        .checkbox-group { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 25px; 
            padding: 12px;
            background: var(--accent);
            border-radius: 10px;
            cursor: pointer;
        }
        .checkbox-group label { margin-bottom: 0; font-weight: 600; font-size: 14px; cursor: pointer; color: var(--text-main); }
        .checkbox-group input { width: auto; cursor: pointer; accent-color: var(--primary); transform: scale(1.1); }

        select { 
            width: 100%; 
            padding: 10px 12px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            background-color: white;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
        }

        input[type="range"] { 
            width: 100%; 
            accent-color: var(--primary);
            cursor: pointer;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            font-size: 15px; 
            font-weight: 700; 
            color: white; 
            background-color: var(--primary); 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }
        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 6px 10px -1px rgba(37, 99, 235, 0.3); }
        button:active { transform: translateY(0); }

        .btn-restart { 
            background-color: white; 
            color: var(--text-muted); 
            border: 1px solid var(--border);
            box-shadow: none;
        }
        .btn-restart:hover { 
            background-color: var(--accent); 
            color: var(--danger);
            border-color: var(--danger);
            box-shadow: none;
        }

        .stats { 
            background: var(--accent); 
            padding: 18px; 
            border-radius: 12px; 
            margin-top: 15px; 
            border: 1px solid var(--border); 
        }
        .stats p { margin: 8px 0; font-size: 14px; color: var(--text-muted); font-weight: 500; }
        .stats span { color: var(--primary); font-weight: 700; font-size: 15px; }

        /* 오른쪽 차트 그리드 */
        .chart-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
        }
        .chart-container { 
            background: var(--bg-card); 
            border-radius: 16px; 
            box-shadow: 0 4px 15px -3px rgba(0,0,0,0.05); 
            padding: 20px; 
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        .chart-container:hover { transform: translateY(-2px); }
        .chart-title { 
            text-align: left; 
            font-weight: 700; 
            margin-bottom: 15px; 
            color: var(--text-main); 
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--primary);
            border-radius: 2px;
        }
        .plot { width: 100%; height: 380px; }

        @media (max-width: 1024px) {
            .dashboard { grid-template-columns: 1fr; }
            .sidebar { position: static; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>2D 베이지안 최적화 공간 탐색 데모</h1>
</div>

<div class="dashboard">
    <div class="sidebar">
        <h2>탐색 컨트롤러</h2>

        <div class="control-group">
            <label for="afSelect">획득 함수 (Acquisition):</label>
            <select id="afSelect" onchange="updateCharts()">
                <option value="UCB">UCB (Upper Confidence Bound)</option>
                <option value="EI">EI (Expected Improvement)</option>
                <option value="PI">PI (Probability of Improvement)</option>
            </select>
        </div>

        <div class="control-group">
            <label for="kappaSlider"><span id="paramLabel">탐색 파라미터 (κ):</span> <span id="paramValue" style="color: var(--primary); font-weight: 700;">2.0</span></label>
            <input type="range" id="kappaSlider" min="0" max="5" step="0.1" value="2.0" oninput="updateCharts()">
        </div>

        <div class="checkbox-group" onclick="document.getElementById('showLinesCheck').click()">
            <input type="checkbox" id="showLinesCheck" checked onchange="updateCharts()" onclick="event.stopPropagation()">
            <label for="showLinesCheck">등고선 선 표시 (Contour Lines)</label>
        </div>

        <button id="nextBtn" onclick="sampleNextPoint()">다음 추천 위치 관측하기</button>
        <button class="btn-restart" onclick="restart()">전체 초기화 (Restart)</button>

        <div class="stats">
            <p>관측 횟수: <span id="statCount">0</span>회</p>
            <p>현재 최고 성능 (Z): <span id="statBest">0.000</span></p>
        </div>
    </div>

    <div class="chart-grid">
        <div class="chart-container">
            <div class="chart-title">목표 함수 (실제 데이터 지형)</div>
            <div id="plot-true" class="plot"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title">예측 모델 (AI가 추론한 평균값)</div>
            <div id="plot-mean" class="plot"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title">예측 오차 (불확실성 분포)</div>
            <div id="plot-var" class="plot"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title">획득 함수 점수 (다음 실험 위치 추천)</div>
            <div id="plot-acq" class="plot"></div>
        </div>
    </div>
</div>

<script>
    // 1. 초기 설정 (2D 그리드 및 실제 함수)
    const gridSize = 35;
    const x_linspace = Array.from({length: gridSize}, (_, i) => i * 10 / (gridSize - 1));
    const y_linspace = Array.from({length: gridSize}, (_, i) => i * 10 / (gridSize - 1));

    let true_function;
    let Z_true = [];
    let X_train = [];
    let Y_train = [];
    let next_candidate = null;

    // 복잡한 2D 지형 생성을 위한 무작위 함수
    function generateRandomTrueFunction() {
        const cx1 = 2 + Math.random() * 6; const cy1 = 2 + Math.random() * 6;
        const cx2 = 2 + Math.random() * 6; const cy2 = 2 + Math.random() * 6;
        const w = 1 + Math.random() * 2;
        return (x, y) => {
            const p1 = Math.exp(-((x - cx1)**2 + (y - cy1)**2) / 4);
            const p2 = 0.8 * Math.exp(-((x - cx2)**2 + (y - cy2)**2) / 3);
            const wave = 0.2 * Math.sin(w * x) * Math.cos(w * y);
            return p1 + p2 + wave;
        };
    }

    const normalPDF = (x) => Math.exp(-0.5 * x * x) / Math.sqrt(2 * Math.PI);
    const normalCDF = (x) => 0.5 * (1 + math.erf(x / Math.sqrt(2)));

    function restart() {
        true_function = generateRandomTrueFunction();

        Z_true = [];
        for (let j = 0; j < gridSize; j++) {
            let row = [];
            for (let i = 0; i < gridSize; i++) {
                row.push(true_function(x_linspace[i], y_linspace[j]));
            }
            Z_true.push(row);
        }

        X_train = [];
        Y_train = [];
        for(let k=0; k<3; k++) {
            const rx = Math.random() * 10;
            const ry = Math.random() * 10;
            X_train.push([rx, ry]);
            Y_train.push(true_function(rx, ry));
        }

        updateCharts();
    }

    // 2. 2D 가우시안 프로세스 계산
    function computeGP() {
        const l = 1.5; 
        const sigma_f = 1.0; 
        const sigma_n = 0.01; 
        const N = X_train.length;

        const kernel = (x1, x2) => {
            const distSq = Math.pow(x1[0] - x2[0], 2) + Math.pow(x1[1] - x2[1], 2);
            return Math.pow(sigma_f, 2) * Math.exp(-0.5 * distSq / Math.pow(l, 2));
        };

        let K = [];
        for (let i = 0; i < N; i++) {
            K[i] = [];
            for (let j = 0; j < N; j++) {
                K[i][j] = kernel(X_train[i], X_train[j]) + (i === j ? Math.pow(sigma_n, 2) : 0);
            }
        }

        const K_inv = math.inv(K);
        let Y_train_mat = math.matrix(Y_train.map(y => [y]));
        let alpha = math.multiply(K_inv, Y_train_mat);

        let mean_grid = [];
        let std_grid = [];

        for (let j = 0; j < gridSize; j++) {
            let mean_row = [];
            let std_row = [];
            const y_test = y_linspace[j];

            for (let i = 0; i < gridSize; i++) {
                const x_test = x_linspace[i];
                const pt = [x_test, y_test];

                let k_star = [];
                for (let n = 0; n < N; n++) {
                    k_star.push(kernel(pt, X_train[n]));
                }

                let k_star_mat = math.matrix([k_star]);
                let mu = math.multiply(k_star_mat, alpha).get([0, 0]);
                mean_row.push(mu);

                let k_star_star = kernel(pt, pt);
                let k_star_T = math.transpose(k_star_mat);
                let v = k_star_star - math.multiply(math.multiply(k_star_mat, K_inv), k_star_T).get([0, 0]);
                std_row.push(Math.sqrt(Math.max(v, 0)));
            }
            mean_grid.push(mean_row);
            std_grid.push(std_row);
        }
        return { mean_grid, std_grid };
    }

    // 3. 차트 업데이트 로직
    function updateCharts() {
        const { mean_grid, std_grid } = computeGP();
        const afType = document.getElementById('afSelect').value;
        const paramValue = parseFloat(document.getElementById('kappaSlider').value);
        const showLines = document.getElementById('showLinesCheck').checked;

        document.getElementById('paramValue').innerText = paramValue.toFixed(2);
        document.getElementById('paramLabel').innerText = afType === 'UCB' ? '탐색 파라미터 (κ):' : '탐색 파라미터 (ξ):';

        const y_best = Math.max(...Y_train);

        document.getElementById('statCount').innerText = X_train.length;
        document.getElementById('statBest').innerText = y_best.toFixed(4);

        let acq_grid = [];
        let max_acq = -Infinity;
        let best_acq_idx = [0, 0];

        for (let j = 0; j < gridSize; j++) {
            let acq_row = [];
            for (let i = 0; i < gridSize; i++) {
                const m = mean_grid[j][i];
                const s = std_grid[j][i];
                let val = 0;

                if (afType === 'UCB') {
                    val = m + paramValue * s;
                } else {
                    if (s > 1e-9) {
                        const Z = (m - y_best - paramValue) / s;
                        if (afType === 'PI') val = normalCDF(Z);
                        else if (afType === 'EI') val = (m - y_best - paramValue) * normalCDF(Z) + s * normalPDF(Z);
                    }
                }
                acq_row.push(val);

                if (val > max_acq) {
                    max_acq = val;
                    best_acq_idx = [i, j]; 
                }
            }
            acq_grid.push(acq_row);
        }

        next_candidate = [x_linspace[best_acq_idx[0]], y_linspace[best_acq_idx[1]]];

        const commonLayout = { margin: {l: 30, r: 10, b: 30, t: 10}, xaxis: {range: [0, 10]}, yaxis: {range: [0, 10]}, showlegend: false };

        const obs_trace = { 
            x: X_train.map(pt => pt[0]), 
            y: X_train.map(pt => pt[1]), 
            mode: 'markers', 
            marker: {
                color: 'white', 
                size: 10, 
                line: { color: 'black', width: 2 }
            }, 
            type: 'scatter' 
        };

        const next_trace = { x: [next_candidate[0]], y: [next_candidate[1]], mode: 'markers', marker: {color: 'red', size: 14, symbol: 'star'}, type: 'scatter' };

        // ★ 버그 수정: 선 두께(width)를 0으로 설정하여 선을 완전히 숨김
        const contourSettings = { coloring: 'heatmap', showlines: showLines };
        const lineSettings = { width: showLines ? 1 : 0 }; 

        Plotly.react('plot-true', [
            { z: Z_true, x: x_linspace, y: y_linspace, type: 'contour', colorscale: 'Viridis', contours: contourSettings, line: lineSettings },
            obs_trace
        ], commonLayout, {displayModeBar: false});

        Plotly.react('plot-mean', [
            { z: mean_grid, x: x_linspace, y: y_linspace, type: 'contour', colorscale: 'Viridis', contours: contourSettings, line: lineSettings },
            obs_trace, next_trace
        ], commonLayout, {displayModeBar: false});

        Plotly.react('plot-var', [
            { z: std_grid, x: x_linspace, y: y_linspace, type: 'contour', colorscale: 'Cividis', contours: contourSettings, line: lineSettings },
            obs_trace
        ], commonLayout, {displayModeBar: false});

        Plotly.react('plot-acq', [
            { z: acq_grid, x: x_linspace, y: y_linspace, type: 'contour', colorscale: 'YlGnBu', contours: contourSettings, line: lineSettings },
            next_trace
        ], commonLayout, {displayModeBar: false});
    }

    function sampleNextPoint() {
        if (next_candidate) {
            X_train.push([next_candidate[0], next_candidate[1]]);
            Y_train.push(true_function(next_candidate[0], next_candidate[1]));
            updateCharts();
        }
    }

    restart();
</script>

</body>
</html>

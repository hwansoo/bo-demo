<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다목적 베이지안 최적화 (MOBO) 데모</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #f1f5f9;
            --success: #10b981;
            --danger: #ef4444;
            --f1-color: #3b82f6;
            --f2-color: #f97316;
        }

        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg-main); 
            color: var(--text-main);
            line-height: 1.6;
        }

        .header { 
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white; 
            padding: 30px 20px; 
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.025em; }

        .dashboard { 
            display: grid; 
            grid-template-columns: 320px 1fr; 
            gap: 24px; 
            max-width: 1500px; 
            margin: -20px auto 40px; 
            padding: 0 20px;
        }

        /* 왼쪽 컨트롤 패널 */
        .sidebar { 
            background: var(--bg-card); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
            height: fit-content;
            border: 1px solid var(--border);
            position: sticky;
            top: 20px;
        }
        .sidebar h2 { 
            margin-top: 0; 
            color: var(--text-main); 
            font-size: 18px; 
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: var(--primary);
            border-radius: 2px;
        }
        .subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 25px; font-weight: 500; }

        .weight-box { 
            background: #f0fdf4; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #dcfce7; 
            margin-bottom: 25px; 
        }
        .weight-box label { 
            color: #166534; 
            margin-bottom: 12px; 
            display: block; 
            font-weight: 700;
            font-size: 14px;
        }
        .weight-box small { 
            color: var(--text-muted); 
            display: block; 
            margin-top: 12px; 
            line-height: 1.5; 
            font-size: 12px;
            font-weight: 500;
        }

        .control-group { margin-bottom: 24px; }
        .control-group label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 10px; 
            color: var(--text-main);
            font-size: 14px;
        }

        input[type="range"] { 
            width: 100%; 
            accent-color: var(--primary);
            cursor: pointer;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            font-size: 15px; 
            font-weight: 700; 
            color: white; 
            background-color: var(--primary); 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }
        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 6px 10px -1px rgba(37, 99, 235, 0.3); }
        button:active { transform: translateY(0); }

        .btn-restart { 
            background-color: white; 
            color: var(--text-muted); 
            border: 1px solid var(--border);
            box-shadow: none;
        }
        .btn-restart:hover { 
            background-color: var(--accent); 
            color: var(--danger);
            border-color: var(--danger);
            box-shadow: none;
        }

        .stats { 
            background: var(--accent); 
            padding: 18px; 
            border-radius: 12px; 
            margin-top: 15px; 
            border: 1px solid var(--border); 
        }
        .stats p { margin: 8px 0; font-size: 14px; color: var(--text-muted); font-weight: 500; }
        .stats span { color: var(--primary); font-weight: 700; font-size: 15px; }

        /* 오른쪽 차트 그리드 */
        .chart-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
        }
        .chart-container { 
            background: var(--bg-card); 
            border-radius: 16px; 
            box-shadow: 0 4px 15px -3px rgba(0,0,0,0.05); 
            padding: 20px; 
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        .chart-container:hover { transform: translateY(-2px); }
        .chart-title { 
            text-align: left; 
            font-weight: 700; 
            margin-bottom: 15px; 
            color: var(--text-main); 
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--primary);
            border-radius: 2px;
        }
        .plot { width: 100%; height: 340px; }

        @media (max-width: 1024px) {
            .dashboard { grid-template-columns: 1fr; }
            .sidebar { position: static; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>다목적 베이지안 최적화 (MOBO) 시각화 데모</h1>
</div>

<div class="dashboard">
    <div class="sidebar">
        <h2>탐색 컨트롤러</h2>
        <div class="subtitle">Pareto Front & Scalarization</div>

        <div class="weight-box">
            <label for="weightSlider">목표 가중치 (Trade-off):</label>
            <div style="display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; margin-bottom: 8px;">
                <span style="color: var(--f1-color);">← f1 집중</span>
                <span style="color: var(--f2-color);">f2 집중 →</span>
            </div>
            <input type="range" id="weightSlider" min="0" max="1" step="0.05" value="0.5" oninput="updateCharts()">
            <small>슬라이더를 움직여 두 목표 사이의 우선순위를 변경하세요. AI가 추천하는 실험 위치가 달라집니다.</small>
        </div>

        <div class="control-group">
            <label for="kappaSlider">탐색 파라미터 (κ): <span id="kappaValue" style="color: var(--primary); font-weight: 700;">2.0</span></label>
            <input type="range" id="kappaSlider" min="0" max="5" step="0.1" value="2.0" oninput="updateCharts()">
        </div>

        <button id="nextBtn" onclick="sampleNextPoint()">다음 추천 위치 관측하기</button>
        <button class="btn-restart" onclick="restart()">전체 초기화 (Restart)</button>

        <div class="stats">
            <p>관측 횟수: <span id="statCount">0</span>회</p>
            <p>파레토 최적해: <span id="statPareto">0</span>개</p>
        </div>
    </div>

    <div class="chart-grid">
        <div class="chart-container">
            <div class="chart-title">GP 모델 1: f₁(x) (최대화)</div>
            <div id="plot-f1" class="plot"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title" style="color: var(--danger);">결과 공간 (Pareto Front)</div>
            <div id="plot-pareto" class="plot"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title">GP 모델 2: f₂(x) (최대화)</div>
            <div id="plot-f2" class="plot"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title">가중 합산 획득 함수 (Acquisition)</div>
            <div id="plot-acq" class="plot"></div>
        </div>
    </div>
</div>

<script>
    // 1. 초기 설정 및 실제 함수 2개 정의 (서로 상충하는 형태)
    const X_test = Array.from({length: 100}, (_, i) => i * 10 / 99);
    
    // f1: x가 작을 때 유리한 함수
    const f1_true = (x) => 3 * Math.exp(-Math.pow(x - 2, 2) / 5) + Math.sin(1.5 * x) + 2;
    // f2: x가 클 때 유리한 함수
    const f2_true = (x) => 3 * Math.exp(-Math.pow(x - 8, 2) / 5) + Math.cos(1.5 * x) + 2;

    const Y1_true = X_test.map(f1_true);
    const Y2_true = X_test.map(f2_true);

    // True Pareto Front 사전 계산
    function calculateParetoFront(y1_arr, y2_arr) {
        let points = y1_arr.map((y1, i) => ({ y1: y1, y2: y2_arr[i], idx: i }));
        // y1 기준 내림차순, 같으면 y2 기준 내림차순 정렬
        points.sort((a, b) => b.y1 - a.y1 || b.y2 - a.y2);
        
        let pareto = [];
        let maxY2 = -Infinity;
        for (let p of points) {
            if (p.y2 > maxY2) {
                pareto.push(p);
                maxY2 = p.y2;
            }
        }
        return pareto;
    }
    const true_pareto = calculateParetoFront(Y1_true, Y2_true);

    let X_train = [];
    let Y1_train = [];
    let Y2_train = [];
    let next_x_candidate = null;
    let next_pred_f1 = { mean: 0, std: 0 };
    let next_pred_f2 = { mean: 0, std: 0 };

    // 가우시안 프로세스 공용 함수
    function computeGP(x_train, y_train, x_test) {
        const l = 1.0; const sigma_f = 1.5; const sigma_n = 0.05;
        const N = x_train.length; const M = x_test.length;
        const kernel = (x1, x2) => Math.pow(sigma_f, 2) * Math.exp(-0.5 * Math.pow(x1 - x2, 2) / Math.pow(l, 2));

        if (N === 0) return { mean: Array(M).fill(0), std: Array(M).fill(sigma_f) };

        let K = [];
        for (let i = 0; i < N; i++) {
            K[i] = [];
            for (let j = 0; j < N; j++) K[i][j] = kernel(x_train[i], x_train[j]) + (i === j ? Math.pow(sigma_n, 2) : 0);
        }

        const K_mat = math.matrix(K);
        const K_inv = math.inv(K_mat);
        let Y_train_mat = math.matrix(y_train.map(y => [y]));
        let alpha = math.multiply(K_inv, Y_train_mat);

        let mean = [], std = [];
        for (let i = 0; i < M; i++) {
            let k_star = [];
            for (let j = 0; j < N; j++) k_star.push(kernel(x_test[i], x_train[j]));
            
            let k_star_mat = math.matrix([k_star]);
            mean.push(math.multiply(k_star_mat, alpha).get([0, 0]));

            let v = kernel(x_test[i], x_test[i]) - math.multiply(math.multiply(k_star_mat, K_inv), math.transpose(k_star_mat)).get([0, 0]);
            std.push(Math.sqrt(Math.max(v, 0)));
        }
        return { mean, std };
    }

    function restart() {
        X_train = []; Y1_train = []; Y2_train = [];
        // 초기 관측점 3개
        [1, 5, 9].forEach(x => {
            X_train.push(x);
            Y1_train.push(f1_true(x));
            Y2_train.push(f2_true(x));
        });
        updateCharts();
    }

    // 차트 및 로직 업데이트
    function updateCharts() {
        // 1. 각 목표에 대한 GP 모델 계산
        const gp1 = computeGP(X_train, Y1_train, X_test);
        const gp2 = computeGP(X_train, Y2_train, X_test);

        const kappa = parseFloat(document.getElementById('kappaSlider').value);
        const weight_f2 = parseFloat(document.getElementById('weightSlider').value); // 0이면 f1 올인, 1이면 f2 올인
        const weight_f1 = 1.0 - weight_f2;
        document.getElementById('kappaValue').innerText = kappa.toFixed(1);

        // 2. Acquisition Function (Linear Scalarization of UCB)
        let acq = [];
        for (let i = 0; i < X_test.length; i++) {
            let ucb1 = gp1.mean[i] + kappa * gp1.std[i];
            let ucb2 = gp2.mean[i] + kappa * gp2.std[i];
            // 두 목표를 가중합하여 단일 획득 함수로 변환
            acq.push(weight_f1 * ucb1 + weight_f2 * ucb2);
        }

        // 다음 관측점 선정
        const max_acq = Math.max(...acq);
        const max_index = acq.indexOf(max_acq);
        next_x_candidate = X_test[max_index];
        next_pred_f1 = { mean: gp1.mean[max_index], std: gp1.std[max_index] };
        next_pred_f2 = { mean: gp2.mean[max_index], std: gp2.std[max_index] };

        // 관측된 파레토 프론트 계산
        const current_pareto = calculateParetoFront(Y1_train, Y2_train);
        document.getElementById('statCount').innerText = X_train.length;
        document.getElementById('statPareto').innerText = current_pareto.length;

        // --- Plotly 차트 데이터 구성 ---
        const layout_common = { margin: {l: 40, r: 20, b: 30, t: 10}, xaxis: {title: 'Input X'}, showlegend: false };

        // [차트 1] GP Model 1 (f1)
        const trace_true1 = { x: X_test, y: Y1_true, mode: 'lines', line: { dash: 'dash', color: 'rgba(0,0,0,0.3)' } };
        const trace_mean1 = { x: X_test, y: gp1.mean, mode: 'lines', line: { color: '#3b82f6' } };
        const trace_upper1 = { x: X_test, y: gp1.mean.map((m,i)=>m+2*gp1.std[i]), type: 'scatter', mode: 'lines', line: {width:0} };
        const trace_lower1 = { x: X_test, y: gp1.mean.map((m,i)=>m-2*gp1.std[i]), type: 'scatter', mode: 'lines', fill: 'tonexty', fillcolor: 'rgba(59, 130, 246, 0.2)', line: {width:0} };
        const trace_obs1 = { x: X_train, y: Y1_train, mode: 'markers', marker: { color: 'black', size: 8 } };
        const trace_next1 = { x: [next_x_candidate], y: [next_pred_f1.mean], mode: 'markers', marker: { symbol: 'star', color: 'red', size: 14 } };
        Plotly.react('plot-f1', [trace_upper1, trace_lower1, trace_true1, trace_mean1, trace_obs1, trace_next1], { ...layout_common, yaxis: {title: 'f₁ Value'} }, {displayModeBar: false});

        // [차트 2] GP Model 2 (f2)
        const trace_true2 = { x: X_test, y: Y2_true, mode: 'lines', line: { dash: 'dash', color: 'rgba(0,0,0,0.3)' } };
        const trace_mean2 = { x: X_test, y: gp2.mean, mode: 'lines', line: { color: '#f97316' } };
        const trace_upper2 = { x: X_test, y: gp2.mean.map((m,i)=>m+2*gp2.std[i]), type: 'scatter', mode: 'lines', line: {width:0} };
        const trace_lower2 = { x: X_test, y: gp2.mean.map((m,i)=>m-2*gp2.std[i]), type: 'scatter', mode: 'lines', fill: 'tonexty', fillcolor: 'rgba(249, 115, 22, 0.2)', line: {width:0} };
        const trace_obs2 = { x: X_train, y: Y2_train, mode: 'markers', marker: { color: 'black', size: 8 } };
        const trace_next2 = { x: [next_x_candidate], y: [next_pred_f2.mean], mode: 'markers', marker: { symbol: 'star', color: 'red', size: 14 } };
        Plotly.react('plot-f2', [trace_upper2, trace_lower2, trace_true2, trace_mean2, trace_obs2, trace_next2], { ...layout_common, yaxis: {title: 'f₂ Value'} }, {displayModeBar: false});

        // [차트 3] Acquisition Function (가중합)
        const trace_acq = { x: X_test, y: acq, mode: 'lines', fill: 'tozeroy', fillcolor: 'rgba(16, 185, 129, 0.2)', line: { color: '#10b981' } };
        const trace_acq_next = { x: [next_x_candidate], y: [max_acq], mode: 'markers', marker: { symbol: 'star', color: 'red', size: 14 } };
        Plotly.react('plot-acq', [trace_acq, trace_acq_next], { ...layout_common, yaxis: {title: 'Acq Value'} }, {displayModeBar: false});

        // [차트 4] Objective Space (MOBO의 핵심: 파레토 프론트)
        const trace_true_pareto = { 
            x: true_pareto.map(p => p.y1), y: true_pareto.map(p => p.y2), 
            mode: 'lines', line: { color: 'rgba(0,0,0,0.1)', width: 4 }, name: 'True Pareto' 
        };
        const trace_obj_obs = { 
            x: Y1_train, y: Y2_train, 
            mode: 'markers', marker: { color: 'black', size: 8 }, name: 'Observed' 
        };
        const trace_obj_pareto = { 
            x: current_pareto.map(p => p.y1), y: current_pareto.map(p => p.y2), 
            mode: 'lines+markers', line: { color: '#8b5cf6', width: 2 }, marker: { color: '#8b5cf6', size: 10 }, name: 'Current Pareto' 
        };
        // 예측되는 다음 위치 (불확실성 에러바 포함)
        const trace_obj_next = { 
            x: [next_pred_f1.mean], y: [next_pred_f2.mean], 
            error_x: { type: 'data', array: [2 * next_pred_f1.std], visible: true, color: 'rgba(239, 68, 68, 0.4)' },
            error_y: { type: 'data', array: [2 * next_pred_f2.std], visible: true, color: 'rgba(239, 68, 68, 0.4)' },
            mode: 'markers', marker: { symbol: 'star', color: 'red', size: 16 }, name: 'Predicted Next' 
        };

        const layout_obj = { 
            margin: {l: 50, r: 20, b: 40, t: 10}, 
            xaxis: {title: 'f₁ (Maximize)', range: [-1, 6]}, 
            yaxis: {title: 'f₂ (Maximize)', range: [-1, 6]}, 
            showlegend: false, hovermode: 'closest'
        };
        Plotly.react('plot-pareto', [trace_true_pareto, trace_obj_obs, trace_obj_pareto, trace_obj_next], layout_obj, {displayModeBar: false});
    }

    function sampleNextPoint() {
        if (next_x_candidate !== null) {
            X_train.push(next_x_candidate);
            Y_train.push(f1_true(next_x_candidate));
            Y_train.push(f2_true(next_x_candidate));
            updateCharts();
        }
    }

    restart();
</script>

</body>
</html>

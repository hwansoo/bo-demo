<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제약 조건 베이지안 최적화 데모</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #f1f5f9;
            --success: #10b981;
            --danger: #ef4444;
            --warning-bg: #fffbeb;
            --warning-border: #fde68a;
            --warning-text: #92400e;
        }

        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg-main); 
            color: var(--text-main);
            line-height: 1.6;
        }

        .header { 
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white; 
            padding: 30px 20px; 
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.025em; }

        .dashboard { 
            display: grid; 
            grid-template-columns: 320px 1fr; 
            gap: 24px; 
            max-width: 1500px; 
            margin: -20px auto 40px; 
            padding: 0 20px;
        }

        /* 왼쪽 컨트롤 패널 */
        .sidebar { 
            background: var(--bg-card); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
            height: fit-content;
            border: 1px solid var(--border);
            position: sticky;
            top: 20px;
        }
        .sidebar h2 { 
            margin-top: 0; 
            color: var(--text-main); 
            font-size: 18px; 
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: var(--primary);
            border-radius: 2px;
        }
        .subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 25px; font-weight: 500; }

        .constraint-box { 
            background: var(--warning-bg); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--warning-border); 
            margin-bottom: 25px; 
        }
        .constraint-box label { 
            color: var(--warning-text); 
            margin-bottom: 12px; 
            display: block; 
            font-weight: 700;
            font-size: 14px;
        }
        .constraint-box small { 
            color: var(--text-muted); 
            display: block; 
            margin-top: 12px; 
            line-height: 1.5; 
            font-size: 12px;
            font-weight: 500;
        }

        .control-group { margin-bottom: 24px; }
        .control-group label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 10px; 
            color: var(--text-main);
            font-size: 14px;
        }

        input[type="range"] { 
            width: 100%; 
            accent-color: var(--primary);
            cursor: pointer;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            font-size: 15px; 
            font-weight: 700; 
            color: white; 
            background-color: var(--primary); 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }
        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 6px 10px -1px rgba(37, 99, 235, 0.3); }
        button:active { transform: translateY(0); }

        .btn-restart { 
            background-color: white; 
            color: var(--text-muted); 
            border: 1px solid var(--border);
            box-shadow: none;
        }
        .btn-restart:hover { 
            background-color: var(--accent); 
            color: var(--text-main);
            border-color: var(--text-muted);
            box-shadow: none;
        }

        .legend-box { 
            background: var(--accent); 
            padding: 18px; 
            border-radius: 12px; 
            margin-top: 15px; 
            border: 1px solid var(--border); 
            font-size: 13px;
            line-height: 1.8;
        }
        .legend-box strong { display: block; margin-bottom: 8px; color: var(--text-main); }
        .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
        .dot-green { background-color: var(--success); box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2); }
        .dot-red { background-color: var(--danger); box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2); }

        /* 오른쪽 차트 그리드 */
        .chart-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
        }
        .chart-container { 
            background: var(--bg-card); 
            border-radius: 16px; 
            box-shadow: 0 4px 15px -3px rgba(0,0,0,0.05); 
            padding: 20px; 
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        .chart-container:hover { transform: translateY(-2px); }
        .chart-title { 
            text-align: left; 
            font-weight: 700; 
            margin-bottom: 15px; 
            color: var(--text-main); 
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--primary);
            border-radius: 2px;
        }
        .plot { width: 100%; height: 340px; }

        @media (max-width: 1024px) {
            .dashboard { grid-template-columns: 1fr; }
            .sidebar { position: static; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>제약 조건 베이지안 최적화 시각화 데모</h1>
</div>

<div class="dashboard">
    <div class="sidebar">
        <h2>탐색 컨트롤러</h2>
        <div class="subtitle">Maximize f₁(x) s.t. f₂(x) ≥ T</div>

        <div class="constraint-box">
            <label for="thresholdSlider">제약 임계값 (Threshold T): <span id="threshValue" style="color: var(--danger);">2.0</span></label>
            <input type="range" id="thresholdSlider" min="0" max="4.5" step="0.5" value="2.0" oninput="updateCharts()">
            <small>f₂(x)가 이 값 이상이어야만 유효한 설계(Feasible)로 간주됩니다.</small>
        </div>

        <div class="control-group">
            <label for="kappaSlider">탐색 파라미터 (κ): <span id="kappaValue" style="color: var(--primary); font-weight: 700;">2.0</span></label>
            <input type="range" id="kappaSlider" min="0" max="5" step="0.1" value="2.0" oninput="updateCharts()">
        </div>

        <button id="nextBtn" onclick="sampleNextPoint()">다음 추천 위치 관측하기</button>
        <button class="btn-restart" onclick="restart()">전체 초기화 (Restart)</button>

        <div class="legend-box">
            <strong>관측점 상태 범례</strong>
            <div><span class="dot dot-green"></span>조건 만족 (Feasible)</div>
            <div><span class="dot dot-red"></span>조건 위반 (Infeasible)</div>
        </div>
    </div>

    <div class="chart-grid">
        <div class="chart-container">
            <div class="chart-title" style="color: var(--primary);">1. 목표 함수: f₁(x)</div>
            <div id="plot-f1" class="plot"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title" style="color: var(--f2-color);">2. 제약 함수: f₂(x)</div>
            <div id="plot-f2" class="plot"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title" style="color: #8b5cf6;">3. 제약 만족 확률 (PoF)</div>
            <div id="plot-pof" class="plot"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title" style="color: var(--success);">4. 최종 획득 함수 (Acq × PoF)</div>
            <div id="plot-acq" class="plot"></div>
        </div>
    </div>
</div>

<script>
    // 1. 초기 설정 및 실제 함수
    const X_test = Array.from({length: 100}, (_, i) => i * 10 / 99);
    
    // f1 (Objective): x가 클수록 전반적으로 증가하지만 굴곡이 있음. 최댓값은 오른쪽 끝.
    const f1_true = (x) => 2 * Math.sin(x) + x / 1.5 + 4;
    // f2 (Constraint): 가운데 구역(x ≒ 5)만 값이 높고, 양 끝은 값이 낮음.
    const f2_true = (x) => 4.5 - Math.pow(x - 5, 2) / 2.5;

    const Y1_true = X_test.map(f1_true);
    const Y2_true = X_test.map(f2_true);

    let X_train = [];
    let Y1_train = [];
    let Y2_train = [];
    let next_x_candidate = null;

    // GP 연산 공용 함수
    function computeGP(x_train, y_train, x_test) {
        const l = 1.2; const sigma_f = 2.0; const sigma_n = 0.05;
        const N = x_train.length; const M = x_test.length;
        const kernel = (x1, x2) => Math.pow(sigma_f, 2) * Math.exp(-0.5 * Math.pow(x1 - x2, 2) / Math.pow(l, 2));

        if (N === 0) return { mean: Array(M).fill(0), std: Array(M).fill(sigma_f) };

        let K = [];
        for (let i = 0; i < N; i++) {
            K[i] = [];
            for (let j = 0; j < N; j++) K[i][j] = kernel(x_train[i], x_train[j]) + (i === j ? Math.pow(sigma_n, 2) : 0);
        }

        const K_mat = math.matrix(K);
        const K_inv = math.inv(K_mat);
        let Y_train_mat = math.matrix(y_train.map(y => [y]));
        let alpha = math.multiply(K_inv, Y_train_mat);

        let mean = [], std = [];
        for (let i = 0; i < M; i++) {
            let k_star = [];
            for (let j = 0; j < N; j++) k_star.push(kernel(x_test[i], x_train[j]));
            let k_star_mat = math.matrix([k_star]);
            mean.push(math.multiply(k_star_mat, alpha).get([0, 0]));
            let v = kernel(x_test[i], x_test[i]) - math.multiply(math.multiply(k_star_mat, K_inv), math.transpose(k_star_mat)).get([0, 0]);
            std.push(Math.sqrt(Math.max(v, 0)));
        }
        return { mean, std };
    }

    const normalCDF = (x) => 0.5 * (1 + math.erf(x / Math.sqrt(2)));

    function restart() {
        X_train = []; Y1_train = []; Y2_train = [];
        // 초기 관측점: 1개는 제약조건 만족(가운데), 1개는 불만족(왼쪽 끝)
        [1.5, 5.5].forEach(x => {
            X_train.push(x);
            Y1_train.push(f1_true(x));
            Y2_train.push(f2_true(x));
        });
        updateCharts();
    }

    function updateCharts() {
        const threshold = parseFloat(document.getElementById('thresholdSlider').value);
        const kappa = parseFloat(document.getElementById('kappaSlider').value);
        document.getElementById('threshValue').innerText = threshold.toFixed(1);
        document.getElementById('kappaValue').innerText = kappa.toFixed(1);

        const gp1 = computeGP(X_train, Y1_train, X_test);
        const gp2 = computeGP(X_train, Y2_train, X_test);

        let pof = []; // Probability of Feasibility
        let acq_base = []; // Unconstrained UCB
        let acq_constrained = []; // Final Acquisition

        for (let i = 0; i < X_test.length; i++) {
            // 1. PoF 계산: P(f2 >= Threshold)
            let z = (gp2.mean[i] - threshold) / (gp2.std[i] + 1e-9);
            let prob = normalCDF(z);
            pof.push(prob);

            // 2. Base Acquisition (UCB of f1)
            let ucb = gp1.mean[i] + kappa * gp1.std[i];
            acq_base.push(ucb);

            // 3. Constrained Acquisition
            acq_constrained.push(ucb * prob);
        }

        const max_acq = Math.max(...acq_constrained);
        const max_index = acq_constrained.indexOf(max_acq);
        next_x_candidate = X_test[max_index];

        // 관측점의 성공/실패 색상 분류
        let color_feasible = '#10b981'; // Green
        let color_infeasible = '#ef4444'; // Red
        let marker_colors = Y2_train.map(y2 => y2 >= threshold ? color_feasible : color_infeasible);

        const layout_common = { margin: {l: 40, r: 20, b: 30, t: 10}, xaxis: {title: 'Input X'}, showlegend: false };

        // [차트 1] Objective Model
        const trace_true1 = { x: X_test, y: Y1_true, mode: 'lines', line: { dash: 'dash', color: 'rgba(0,0,0,0.2)' } };
        const trace_mean1 = { x: X_test, y: gp1.mean, mode: 'lines', line: { color: '#2563eb' } };
        const trace_upper1 = { x: X_test, y: gp1.mean.map((m,i)=>m+2*gp1.std[i]), type: 'scatter', mode: 'lines', line: {width:0} };
        const trace_lower1 = { x: X_test, y: gp1.mean.map((m,i)=>m-2*gp1.std[i]), type: 'scatter', mode: 'lines', fill: 'tonexty', fillcolor: 'rgba(37, 99, 235, 0.1)', line: {width:0} };
        const trace_obs1 = { x: X_train, y: Y1_train, mode: 'markers', marker: { color: marker_colors, size: 10, line: {color:'white', width:2} } };
        const trace_next1 = { x: [next_x_candidate], y: [gp1.mean[max_index]], mode: 'markers', marker: { symbol: 'star', color: 'red', size: 14 } };
        Plotly.react('plot-f1', [trace_upper1, trace_lower1, trace_true1, trace_mean1, trace_obs1, trace_next1], { ...layout_common, yaxis: {title: 'f₁ Value'} }, {displayModeBar: false});

        // [차트 2] Constraint Model
        const trace_true2 = { x: X_test, y: Y2_true, mode: 'lines', line: { dash: 'dash', color: 'rgba(0,0,0,0.2)' } };
        const trace_mean2 = { x: X_test, y: gp2.mean, mode: 'lines', line: { color: '#f97316' } };
        const trace_upper2 = { x: X_test, y: gp2.mean.map((m,i)=>m+2*gp2.std[i]), type: 'scatter', mode: 'lines', line: {width:0} };
        const trace_lower2 = { x: X_test, y: gp2.mean.map((m,i)=>m-2*gp2.std[i]), type: 'scatter', mode: 'lines', fill: 'tonexty', fillcolor: 'rgba(249, 115, 22, 0.1)', line: {width:0} };
        const trace_obs2 = { x: X_train, y: Y2_train, mode: 'markers', marker: { color: marker_colors, size: 10, line: {color:'white', width:2} } };
        
        // Threshold Line (가장 중요)
        const trace_threshold = { x: [0, 10], y: [threshold, threshold], mode: 'lines', line: { color: '#ef4444', dash: 'dot', width: 2 } };
        Plotly.react('plot-f2', [trace_upper2, trace_lower2, trace_true2, trace_mean2, trace_obs2, trace_threshold], { ...layout_common, yaxis: {title: 'f₂ Value'} }, {displayModeBar: false});

        // [차트 3] Probability of Feasibility (PoF)
        const trace_pof = { x: X_test, y: pof, mode: 'lines', fill: 'tozeroy', fillcolor: 'rgba(139, 92, 246, 0.1)', line: { color: '#8b5cf6', width: 2 } };
        Plotly.react('plot-pof', [trace_pof], { ...layout_common, yaxis: {title: 'P(f₂ ≥ T)', range: [-0.05, 1.05]} }, {displayModeBar: false});

        // [차트 4] Constrained Acquisition
        const trace_acq = { x: X_test, y: acq_constrained, mode: 'lines', fill: 'tozeroy', fillcolor: 'rgba(16, 185, 129, 0.1)', line: { color: '#10b981', width: 2 } };
        const trace_acq_next = { x: [next_x_candidate], y: [max_acq], mode: 'markers', marker: { symbol: 'star', color: 'red', size: 16 } };
        Plotly.react('plot-acq', [trace_acq, trace_acq_next], { ...layout_common, yaxis: {title: 'Acq × PoF'} }, {displayModeBar: false});
    }

    function sampleNextPoint() {
        if (next_x_candidate !== null) {
            X_train.push(next_x_candidate);
            Y1_train.push(f1_true(next_x_candidate));
            Y2_train.push(f2_true(next_x_candidate));
            updateCharts();
        }
    }

    restart();
</script>

</body>
</html>
